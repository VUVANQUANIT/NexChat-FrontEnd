<div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4"
    role="dialog" aria-modal="true" aria-labelledby="profile-modal-title">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-slate-950/75 backdrop-blur-sm" (click)="close()"></div>

    <!-- Panel -->
    <div class="relative w-full sm:max-w-md flex flex-col rounded-t-2xl sm:rounded-2xl border border-indigo-400/20 bg-slate-900/95 shadow-2xl overflow-hidden"
        (click)="$event.stopPropagation()">

        <!-- Header -->
        <div class="flex items-center justify-between px-5 py-4 border-b border-indigo-400/15">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-xl bg-violet-500/20 border border-violet-400/30 flex items-center justify-center">
                    <svg class="w-5 h-5 text-violet-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <h2 id="profile-modal-title" class="text-base font-semibold text-white">Hồ sơ của bạn</h2>
            </div>
            <button type="button" (click)="close()"
                class="p-2 rounded-lg text-slate-400 hover:text-white hover:bg-white/10 cursor-pointer transition"
                aria-label="Đóng">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Avatar preview -->
        <div class="flex flex-col items-center px-5 pt-6 pb-4">
            <div class="relative">
                @if (avatarPreview()) {
                <img [src]="avatarPreview()" (error)="onAvatarError()" alt="Ảnh đại diện"
                    class="w-20 h-20 rounded-full object-cover border-2 border-indigo-400/40 shadow-xl" />
                } @else {
                <div class="w-20 h-20 rounded-full bg-gradient-to-tr from-indigo-500 to-violet-600 flex items-center justify-center text-3xl font-bold text-white shadow-xl border-2 border-indigo-400/30">
                    {{ avatarLetter() }}
                </div>
                }
                <div class="absolute -bottom-1 -right-1 w-6 h-6 rounded-full bg-indigo-600 border-2 border-slate-900 flex items-center justify-center">
                    <svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                    </svg>
                </div>
            </div>
            <p class="mt-3 text-base font-semibold text-white">{{ currentUser()?.username }}</p>
            <p class="text-xs text-slate-500">{{ currentUser()?.email }}</p>
        </div>

        <!-- Form -->
        <form [formGroup]="form" (ngSubmit)="save()" class="px-5 pb-5 space-y-4">
            <!-- Full name -->
            <div>
                <label for="fullName" class="block text-xs font-semibold text-slate-400 mb-1.5">
                    Tên hiển thị
                </label>
                <input id="fullName" type="text" formControlName="fullName"
                    placeholder="Nhập tên hiển thị của bạn..."
                    class="w-full px-3 py-2.5 rounded-xl bg-slate-800/80 border border-indigo-400/20 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" />
            </div>

            <!-- Avatar URL -->
            <div>
                <label for="avatarUrl" class="block text-xs font-semibold text-slate-400 mb-1.5">
                    URL ảnh đại diện
                </label>
                <input id="avatarUrl" type="url" formControlName="avatarUrl"
                    (input)="onAvatarUrlInput()"
                    placeholder="https://example.com/avatar.jpg"
                    class="w-full px-3 py-2.5 rounded-xl bg-slate-800/80 border border-indigo-400/20 text-sm text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/50" />
                <p class="mt-1 text-xs text-slate-500">Nhập URL ảnh để đặt làm ảnh đại diện. Ảnh xem trước sẽ cập nhật ngay.</p>
            </div>

            <!-- Buttons -->
            <div class="flex gap-3 pt-1">
                <button type="button" (click)="close()" [disabled]="isSaving()"
                    class="flex-1 py-2.5 rounded-xl text-sm font-semibold text-slate-300 bg-slate-800 hover:bg-slate-700 border border-slate-700/50 disabled:opacity-50 cursor-pointer transition">
                    Hủy
                </button>
                <button type="submit" [disabled]="form.invalid || isSaving()"
                    class="flex-1 inline-flex items-center justify-center gap-2 py-2.5 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-500 hover:to-violet-500 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer shadow-lg transition">
                    @if (isSaving()) {
                    <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
                    </svg>
                    Đang lưu...
                    } @else {
                    Lưu thay đổi
                    }
                </button>
            </div>
        </form>
    </div>
</div>
